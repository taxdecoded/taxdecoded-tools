<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>Estimated Tax — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:800px;height:800px;overflow:hidden;font-family:'DM Sans',sans-serif;background:#1A2744;color:#fff;display:flex;align-items:center;justify-content:center}
  .page{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;position:relative}
  .brand{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:20px}.brand span:first-child{color:#fff}.brand span:last-child{color:#C5A55A}
  .badge{display:inline-block;background:rgba(197,165,90,.18);border:1.5px solid rgba(197,165,90,.4);color:#C5A55A;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:8px 22px;border-radius:20px;margin-bottom:28px}
  h1{font-family:'Playfair Display',serif;font-size:52px;font-weight:800;line-height:1.15;text-align:center;margin-bottom:8px}h1 em{color:#C5A55A;font-style:normal}
  .subtitle{color:rgba(255,255,255,.6);font-size:16px;line-height:1.6;text-align:center;max-width:480px;margin-bottom:48px}
  .stats{display:flex;gap:16px}
  .stat{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:24px 32px;text-align:center;min-width:150px}
  .stat .val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px}
  .stat .lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45)}
  .footer{position:absolute;bottom:32px;font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3)}
</style>
</head>
<body>
<div class="page">
  <div class="brand"><span>Tax</span><span>Decoded</span></div>
  <div class="badge">Updated for OBBBA &bull; Tax Year 2025</div>
  <h1>Estimated Tax <em>Payments</em></h1>
  <p class="subtitle">Calculate your quarterly estimated tax payments with safe harbor rules, SE tax, NIIT, and penalty risk assessment.</p>
  <div class="stats">
    <div class="stat"><div class="val">4 Qtrs</div><div class="lbl">Payment Schedule</div></div>
    <div class="stat"><div class="val">SE Tax</div><div class="lbl">Built In</div></div>
    <div class="stat"><div class="val">2025</div><div class="lbl">Safe Harbor</div></div>
  </div>
  <div class="footer">Built by a Licensed CPA &bull; Instant Digital Download</div>
</div>
</body>
</html>
