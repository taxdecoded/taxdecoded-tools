<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>EIC Qualifier — CPA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:800px;height:800px;overflow:hidden;font-family:'DM Sans',sans-serif;background:#F9F5EC;color:#1A2744;display:flex;align-items:center;justify-content:center}
  .page{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;position:relative}
  .circle{width:100px;height:100px;border-radius:50%;border:2px solid #C5A55A;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
  .circle span{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#C5A55A}
  h2{font-family:'Playfair Display',serif;font-size:38px;font-weight:800;text-align:center;line-height:1.2;margin-bottom:16px}h2 em{color:#C5A55A;font-style:normal}
  .desc{color:#5a6272;font-size:15px;line-height:1.6;text-align:center;max-width:420px;margin-bottom:44px}
  .pills{display:flex;gap:14px}
  .pill{background:#fff;border-radius:12px;padding:20px 28px;text-align:center;box-shadow:0 2px 12px rgba(26,39,68,.06);min-width:150px}
  .pill .val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1A2744;margin-bottom:4px}
  .pill .lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#5a6272}
  .footer{position:absolute;bottom:32px;font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(26,39,68,.25)}
</style>
</head>
<body>
<div class="page">
  <div class="circle"><span>CPA</span></div>
  <h2>Built by a<br><em>Licensed CPA</em></h2>
  <p class="desc">Every calculation verified against IRS.gov guidance and the One Big Beautiful Bill Act.</p>
  <div class="pills">
    <div class="pill"><div class="val">IRS Verified</div><div class="lbl">Accuracy</div></div>
    <div class="pill"><div class="val">OBBBA 2025</div><div class="lbl">Tax Law</div></div>
    <div class="pill"><div class="val">Print Ready</div><div class="lbl">Format</div></div>
  </div>
  <div class="footer">Updated for the Latest 2025 Tax Law Changes</div>
</div>
</body>
</html>
